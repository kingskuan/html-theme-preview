<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>测试样例</title>
<style>
  body { background: #fff; font-family: sans-serif; padding: 20px; }
  h1 { color: red; }
  table tr:nth-child(even) { background: #eee; }
</style>
</head>
<body>
<h1>Hello Theme Preview</h1>
<p>这是一段用来测试样式的文字。上传这个文件到主题预览工具，选择不同主题查看效果。</p>
<h2>代码示例</h2>
<pre><code>function hello() {
  console.log("Hello, World!");
}</code></pre>
<blockquote>这是一段引用文字，用来测试引用样式的效果。</blockquote>
<h2>表格测试</h2>
<table>
  <tr><th>Item</th><th>Value</th></tr>
  <tr><td>A</td><td>100</td></tr>
  <tr><td>B</td><td>200</td></tr>
</table>
<h2>其他测试</h2>
<p><a href="#">一个链接</a>，一些 <strong>加粗</strong> 和 <em>斜体</em> 文字。</p>
<form>
  <input type="text" placeholder="输入一些文字...">
  <button type="button">点我</button>
</form>
</body>
</html>
