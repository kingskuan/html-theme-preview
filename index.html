<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Theme Preview</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:#0d1117;color:#e6e6e6;
    display:flex;flex-direction:column;
  }

  /* ─ header ─ */
  .header{
    display:flex;align-items:center;gap:12px;padding:8px 16px;
    background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;min-height:44px;
  }
  .header h1{font-size:14px;font-weight:600;color:#f0f6fc;white-space:nowrap}
  .file-name{margin-left:auto;font-size:12px;color:#8b949e;max-width:40ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ─ theme bar ─ */
  .theme-bar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:8px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;
  }
  .theme-bar label{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.05em}

  /* theme cards */
  .theme-grid{display:flex;gap:6px;flex-wrap:wrap}

  .theme-card{
    display:flex;align-items:center;gap:5px;
    padding:4px 10px;border:1px solid #30363d;border-radius:20px;
    background:#21262d;color:#8b949e;font-size:12px;cursor:pointer;
    transition:all .15s;
  }
  .theme-card:hover{border-color:#484f58;color:#e6e6e6}
  .theme-card.active{border-color:#58a6ff;background:#1f3a5f;color:#79c0ff}

  .theme-swatch{
    width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15)
  }

  /* download button */
  .download-btn{
    margin-left:auto;padding:4px 14px;border:1px solid #238636;
    border-radius:20px;background:#238636;color:#fff;font-size:12px;cursor:pointer;
    transition:all .15s;
  }
  .download-btn:hover{background:#2ea043}
  .download-btn:disabled{opacity:.4;cursor:default;background:#1a3a20}

  /* ─ upload zone / preview ─ */
  .main{flex:1;position:relative;overflow:hidden}

  /* upload dropzone */
  .upload-zone{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    cursor:pointer;z-index:2;
  }
  .upload-zone.hidden{display:none}
  .upload-icon{font-size:56px;opacity:.5}
  .upload-text{font-size:16px;color:#8b949e}
  .upload-hint{font-size:12px;color:#484f58}
  #file-input{display:none}

  /* drop overlay */
  .drop-active{
    position:absolute;inset:0;background:rgba(88,166,255,.06);
    border:2px dashed #58a6ff;display:none;align-items:center;
    justify-content:center;font-size:18px;color:#58a6ff;
    z-index:10;pointer-events:none;
  }
  .drop-active.visible{display:flex}

  /* canvas (rendered result) */
  #canvas-wrap{position:absolute;inset:0;overflow:auto}
  #canvas{display:none;min-height:100%;width:100%}
  #canvas.show{display:block}

  /* compare view */
  #compare-wrap{position:absolute;inset:0;overflow:hidden;display:none}
  #compare-wrap.show{display:flex}
  .compare-pane{flex:1;overflow:auto;position:relative}
  .compare-pane:nth-child(2){border-left:2px solid #58a6ff}
  .compare-label{
    position:sticky;top:0;z-index:5;padding:4px 12px;
    background:rgba(88,166,255,.85);color:#000;font-size:11px;font-weight:700;
    text-align:center;backdrop-filter:blur(4px);
  }
  .compare-pane .raw-preview{padding:20px}

  /* toast */
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
    padding:8px 20px;border-radius:8px;background:#238636;color:#fff;font-size:13px;
    transition:transform .3s;z-index:100;opacity:0;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>🌐 HTML Theme Preview</h1>
  <span class="file-name" id="fileName">尚未上传</span>
</div>

<div class="theme-bar">
  <label>主题</label>
  <div class="theme-grid" id="themeGrid">
    <!-- JS fills this -->
  </div>
  <button class="download-btn" id="dlBtn" disabled>⬇ 下载结果 HTML</button>
</div>

<div class="main" id="mainArea">
  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📄</div>
    <div class="upload-text">点击此处或将 HTML 文件拖到此处</div>
    <div class="upload-hint">支持 .html / .htm</div>
  </div>
  <div class="drop-active" id="dropActive">松开鼠标以上传</div>

  <!-- Rendered result (theme-applied) -->
  <div id="canvas-wrap"><iframe id="canvas" sandbox="allow-scripts"></iframe></div>
</div>

<input type="file" id="fileInput" accept=".html,.htm">
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Theme definitions — single CSS string each
   ============================================================ */
const THEMES = {

  dark: ()=>`

a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}

input,textarea,select,button{background:#21262d;border:1px solid #30363d;color:#e6e6e6;border-radius:6px;padding:8px 12px;outline:none}
button{background:#238636;border-color:#2ea043;color:#fff;cursor:pointer}`,

  /* ── Warm ── */
  warm: ()=>`
*,*::before,*::after{box-sizing:border-box}
html{background:#faf6f1}
body{background:#faf6f1;color:#2c1810;max-width:760px;margin:0 auto;padding:56px 28px;line-height:1.8;font-size:17px;font-family:Georgia,serif}
h1,h2,h3,h4{color:#1a0e08;font-weight:800;margin:1.4em 0 .4em}
h1{font-size:2.4em;border-bottom:3px solid #e8d5c0;padding-bottom:.3em}
h2{font-size:1.8em}
p{margin:.8em 0}
a{color:#b45309;text-decoration:none;border-bottom:1px solid #e8d5c0}
a:hover{border-bottom-color:#b45309}
code{background:#f3e8dc;padding:2px 7px;border-radius:4px;font-size:.9em;color:#92400e}
pre{background:#f3e8dc;padding:18px;border-radius:8px;overflow-x:auto;border:1px solid #e8d5c0}
pre code{background:none;padding:0;color:#2c1810}
blockquote{border-left:4px solid #d97706;margin:1em 0;padding:.5em 18px;color:#78350f;background:#fffbeb;border-radius:0 6px 6px 0}
table{border-collapse:collapse;width:100%;margin:1em 0}
td,th{border:1px solid #e8d5c0;padding:10px 14px}
th{background:#fef3c7}
img{max-width:100%;border-radius:8px}
hr{border:none;border-top:2px solid #e8d5c0;margin:2em 0}`,

  /* ── Ocean ── */
  ocean: ()=>`
*,*::before,*::after{box-sizing:border-box}
body{background:#f0f7f4;color:#0f3d3e;max-width:800px;margin:0 auto;padding:52px 28px;line-height:1.75;font-size:16px;font-family:'Inter',system-ui,sans-serif}
h1,h2,h3,h4{color:#0a2e2f;font-weight:700;margin:1.3em 0 .4em}
h1{font-size:2.3em;border-bottom:3px solid #99d5cf;padding-bottom:.25em}
h2{font-size:1.7em}
p{margin:.8em 0}
a{color:#0e7490;text-decoration:none}
a:hover{text-decoration:underline}
code{background:#d1fae5;padding:2px 7px;border-radius:4px;font-size:.9em;color:#065f46}
pre{background:#e0f2f1;padding:18px;border-radius:10px;overflow-x:auto;border:1px solid #99d5cf}
pre code{background:none;padding:0;color:#0f3d3e}
blockquote{border-left:4px solid #14b8a6;margin:1em 0;padding:.5em 18px;color:#134e4a;background:#ccfbf1;border-radius:0 8px 8px 0}
table{border-collapse:collapse;width:100%;margin:1em 0}
td,th{border:1px solid #99d5cf;padding:10px 14px}
th{background:#e0f2f1}
img{max-width:100%;border-radius:8px}
hr{border:none;border-top:1px solid #99d5cf;margin:2em 0}`,

  /* ── Retro Terminal ── */
  retro: ()=>`
*,*::before,*::after{box-sizing:border-box}
html{background:#080808;color:#00ff41;font-family:'Courier New',Consolas,monospace}
body{padding:32px 20px;line-height:1.6;font-size:15px;max-width:75ch;margin:0 auto}
h1,h2,h3,h4{text-transform:uppercase;margin:1.2em 0 .3em}
h1{font-size:1.8em;border-bottom:1px solid #00ff41;padding-bottom:4px}
h2{font-size:1.4em}
a{color:#00ff41;text-decoration:underline}
code,pre{color:#00ff41;font-family:'Courier New',Consolas,monospace}
code{background:#111;padding:2px 6px}

blockquote{border-left:3px solid #00ff41;margin:1em 0;padding:.5em 16px;color:#0c0}
table{border-collapse:collapse;width:100%;margin:1em 0}
td,th{border:1px solid #00ff41;padding:8px 12px}
hr{border:none;border-top:1px solid #00ff41;margin:2em 0}
input,textarea,select,button{background:#111;border:1px solid #00ff41;color:#00ff41;font-family:inherit;padding:6px 10px}`,

  /* ── Neon ── */
  neon: ()=>`
*,*::before,*::after{box-sizing:border-box}
html{background:#0a001a}
body{background:#0a001a;color:#f5e6ff;max-width:820px;margin:0 auto;padding:52px 28px;line-height:1.7;font-size:17px}
h1,h2,h3,h4{color:#fff;font-weight:800;margin:1.3em 0 .4em;font-style:italic}
h1{font-size:2.5em;border-bottom:2px solid #c084fc}
h2{font-size:1.8em}
p{margin:.8em 0}
a{color:#f0abfc;text-decoration:none}
a:hover{color:#fff;text-shadow:0 0 12px #f0abfc}
code{background:rgba(192,132,252,.15);padding:3px 8px;border-radius:5px;color:#e879f9;border:1px solid rgba(192,132,252,.3)}
pre{background:rgba(88,28,135,.3);padding:18px;border-radius:12px;overflow-x:auto;border:1px solid rgba(192,132,252,.25)}
pre code{background:none;border:none;color:#f5e6ff}
blockquote{border-left:4px solid #c084fc;margin:1em 0;padding:.5em 18px;color:#d8b4fe;background:rgba(88,28,135,.15);border-radius:0 8px 8px 0}
table{border-collapse:collapse;width:100%;margin:1em 0}
td,th{border:1px solid rgba(192,132,252,.3);padding:10px 14px}
th{background:rgba(192,132,252,.1);color:#fff}
img{max-width:100%;border-radius:10px}
hr{border:none;border-top:1px solid rgba(192,132,252,.3);margin:2em 0}
input,textarea,select,button{background:rgba(88,28,135,.25);border:1px solid rgba(192,132,252,.4);color:#f5e6ff;border-radius:8px;padding:8px 12px;outline:none}
button{background:rgba(192,132,252,.25);color:#fff;cursor:pointer}`,

  /* ── Sage ── */
  sage: ()=>`
*,*::before,*::after{box-sizing:border-box}
body{background:#f5f5f0;color:#2d3a2e;max-width:760px;margin:0 auto;padding:56px 28px;line-height:1.75;font-size:17px}
h1,h2,h3,h4{color:#1e3a1f;font-weight:700;margin:1.3em 0 .4em}
h1{font-size:2.2em;border-bottom:2px solid #c8d6c0;padding-bottom:.3em}
h2{font-size:1.6em}
p{margin:.8em 0}
a{color:#3b7a1e;text-decoration:none}
a:hover{text-decoration:underline}
code{background:#e8ede5;padding:2px 7px;border-radius:4px;font-size:.9em;color:#2d5a1e}
pre{background:#e8ede5;padding:18px;border-radius:8px;overflow-x:auto;border:1px solid #c8d6c0}
pre code{background:none;padding:0}
blockquote{border-left:4px solid #7aa96e;margin:1em 0;padding:.5em 18px;color:#3f5e35;background:#f0f5ed;border-radius:0 8px 8px 0}
table{border-collapse:collapse;width:100%;margin:1em 0}
td,th{border:1px solid #c8d6c0;padding:10px 14px}
th{background:#e8ede5}
img{max-width:100%;border-radius:8px}
hr{border:none;border-top:1px solid #c8d6c0;margin:2em 0}
input,textarea,select,button{background:#fff;border:1px solid #c8d6c0;color:#2d3a2e;border-radius:6px;padding:8px 12px}`,
};

/* Swatch colors for each theme */
const SWATCHES = {
  minimal:'#e8d4b8', dark:'#161b22', warm:'#f5c87a',
  ocean:'#99d5cf', retro:'#0f0', neon:'#c084fc', sage:'#7aa96e',
};

const THEME_LABELS = {
  minimal:'极简', dark:'深色', warm:'暖色',
  ocean:'海洋', retro:'终端', neon:'霓虹', sage:'鼠尾草',
};

/* ============================================================
   DOM
   ============================================================ */
const $ = id => document.getElementById(id);
const fileInput    = $('fileInput');
const fileName     = $('fileName');
const uploadZone   = $('uploadZone');
const dropActive   = $('dropActive');
const themeGrid    = $('themeGrid');
const canvas       = $('canvas');
const canvasWrap   = $('canvas-wrap');
const dlBtn        = $('dlBtn');
const toast        = $('toast');

let originalHTML = '';
let currentTheme = null;

/* ── Build theme buttons ── */
window.buildThemeButtons = function(){
  themeGrid.innerHTML = '';
  const keys = Object.keys(THEMES);
  keys.forEach(k => {
    const card = document.createElement('div');
    card.className = 'theme-card' + (currentTheme === k ? ' active' : '');
    card.dataset.theme = k;
    const swatch = document.createElement('div');
    swatch.className = 'theme-swatch';
    swatch.style.background = SWATCHES[k];
    card.appendChild(swatch);
    card.appendChild(document.createTextNode(THEME_LABELS[k]));
    card.addEventListener('click', () => applyTheme(k));
    themeGrid.appendChild(card);
  });
};

/* ── File ── */
function handleFile(file){
  if(!file) return;
  fileName.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    originalHTML = e.target.result;
    uploadZone.classList.add('hidden');
    // Reset theme selection
    currentTheme = null;
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
    // Clear canvas
    canvas.classList.remove('show');
    dlBtn.disabled = true;
  };
  reader.readAsText(file);
}

fileInput.addEventListener('change', e => { handleFile(e.target.files[0]); });

/* ── Drag & drop ── */
uploadZone.addEventListener('click', () => fileInput.click());
const main = $('mainArea');
main.addEventListener('dragover',  e => { e.preventDefault(); dropActive.classList.add('visible'); });
main.addEventListener('dragleave', e => { if(!main.contains(e.relatedTarget)) dropActive.classList.remove('visible'); });
main.addEventListener('drop',       e => { e.preventDefault(); dropActive.classList.remove('visible'); handleFile(e.dataTransfer.files[0]); });

/* ── Apply theme ── */
function applyTheme(key){
  if(!originalHTML){ toastMsg('先上传 HTML 文件'); return; }
  currentTheme = key;

  // highlight active card
  document.querySelectorAll('.theme-card').forEach(c => {
    c.classList.toggle('active', c.dataset.theme === key);
  });

  const css = THEMES[key]();
  const fullHTML = injectCSS(originalHTML, css);
  renderInCanvas(fullHTML);
  dlBtn.disabled = false;
  toastMsg(`已应用「${THEME_LABELS[key]}」主题`);
}

/* ── Inject <style> right after <head> ── */
function injectCSS(html, css){
  const m = html.match(/<head[^>]*>/i);
  const tag = '<style id="__app_theme__">/* Theme */\n' + css + '\n</style>';
  return m
    ? html.slice(0, m.index + m[0].length) + '\n' + tag + html.slice(m.index + m[0].length)
    : '<head>' + tag + '</head>' + html;
}

/* ── Render into canvas ── */
function renderInCanvas(html){
  const doc = canvas.contentDocument || canvas.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  canvas.classList.add('show');
}

/* ── Download ── */
dlBtn.addEventListener('click', () => {
  if(!currentTheme) return;
  const css   = THEMES[currentTheme]();
  const finalHTML = injectCSS(originalHTML, css);
  const blob  = new Blob([finalHTML], { type:'text/html;charset=utf-8' });
  const url   = URL.createObjectURL(blob);
  const a     = Object.assign(document.createElement('a'), { href:url });
  const baseName = (fileName.textContent.split(' ')[0] || 'page').replace(/\.html?$/i,'');
  a.download = baseName + '_' + currentTheme + '.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toastMsg('已下载 ✨');
});

/* ── Toast ── */
let toastTimer;
function toastMsg(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

/* Init */
buildThemeButtons();
</script>
</body>
</html>
