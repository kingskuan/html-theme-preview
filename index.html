<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Theme Preview</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: rgba(148, 163, 184, 0.18);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --shadow: 0 16px 40px rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 700px at 20% 0%, #14213d 0%, var(--bg) 45%) fixed;
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, .9);
      backdrop-filter: blur(12px);
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }
    .logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      box-shadow: 0 8px 20px rgba(56, 189, 248, .25);
      font-size: 16px;
      flex: 0 0 auto;
    }
    .brand h1 {
      font-size: 15px;
      margin: 0;
      line-height: 1.1;
      white-space: nowrap;
    }
    .brand .sub {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55vw;
    }
    .status {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 24, 39, .86);
      backdrop-filter: blur(12px);
      flex: 0 0 auto;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .section-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-right: 2px;
    }
    .theme-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    .theme-card {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(17, 24, 39, .9);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
      font-size: 13px;
      line-height: 1;
      box-shadow: 0 1px 0 rgba(255,255,255,.03) inset;
    }
    .theme-card:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.3); }
    .theme-card.active {
      border-color: rgba(96, 165, 250, .75);
      background: rgba(30, 41, 59, .96);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
    }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,.18);
    }
    .download-btn {
      border: 1px solid rgba(34, 197, 94, .35);
      background: linear-gradient(180deg, rgba(34, 197, 94, .95), rgba(22, 163, 74, .95));
      color: white;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(34, 197, 94, .14);
    }
    .download-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .main {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    .upload-zone {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      z-index: 2;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(17,24,39,.45), rgba(17,24,39,.2));
    }
    .upload-zone.hidden { display: none; }
    .upload-box {
      width: min(720px, 100%);
      border: 1px dashed rgba(148,163,184,.32);
      border-radius: 24px;
      padding: 30px 24px;
      background: rgba(15,23,42,.72);
      box-shadow: var(--shadow);
    }
    .upload-emoji { font-size: 56px; margin-bottom: 10px; }
    .upload-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .upload-copy { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .upload-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(148,163,184,.1);
      color: #dbeafe;
      border: 1px solid rgba(148,163,184,.18);
      font-size: 12px;
    }
    .drop-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
      border: 2px dashed rgba(96,165,250,.9);
      background: rgba(37, 99, 235, .08);
      color: #93c5fd;
      font-size: 18px;
      pointer-events: none;
    }
    .drop-overlay.visible { display: flex; }

    .preview-wrap {
      position: absolute;
      inset: 0;
      background: #0a0f1a;
    }
    #preview {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      opacity: 0;
      transition: opacity .18s ease;
    }
    #preview.show { opacity: 1; }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      pointer-events: none;
      padding: 24px;
      text-align: center;
      z-index: 1;
    }
    .empty-card {
      max-width: 520px;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      background: rgba(15,23,42,.65);
      box-shadow: var(--shadow);
    }
    .empty-card strong { color: #fff; }

    #fileInput { display: none; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(18px);
      background: rgba(15, 23, 42, .94);
      color: #fff;
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 20;
      pointer-events: none;
      max-width: calc(100vw - 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .topbar { padding: 10px 12px; }
      .controls { padding: 10px 12px 12px; }
      .brand .sub { max-width: 38vw; }
      .download-btn { width: 100%; }
      .theme-strip { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🌐</div>
      <div style="min-width:0">
        <h1>HTML Theme Preview</h1>
        <span class="sub" id="fileName">尚未上传 HTML</span>
      </div>
    </div>
    <div class="status" id="statusText">请选择文件并挑一个风格</div>
  </header>

  <section class="controls">
    <div class="controls-row">
      <span class="section-label">风格</span>
      <div class="theme-strip" id="themeStrip"></div>
      <button class="download-btn" id="downloadBtn" disabled>⬇ 下载结果 HTML</button>
    </div>
  </section>

  <main class="main" id="mainArea">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-box">
        <div class="upload-emoji">📄</div>
        <div class="upload-title">上传 HTML，然后一键切换不同 UI 风格</div>
        <div class="upload-copy">
          不是换颜色，而是换整套版式：字体、留白、卡片、阴影、边框、标题层级、代码块和按钮样式都会一起变。
        </div>
        <div class="upload-pill">点击这里或拖拽 .html / .htm 文件进来</div>
      </div>
    </div>

    <div class="drop-overlay" id="dropOverlay">松开鼠标以上传</div>
    <div class="empty-state" id="emptyState">
      <div class="empty-card">
        <strong>还没上传文件</strong><br />
        先选一个 HTML 文件。上传后我会直接给你渲染出多个 UI 风格，选中喜欢的再下载对应 HTML。
      </div>
    </div>

    <div class="preview-wrap">
      <iframe id="preview" title="HTML preview"></iframe>
    </div>
  </main>

  <input type="file" id="fileInput" accept=".html,.htm" />
  <div class="toast" id="toast"></div>

  <script>
    const THEMES = {
      editorial: {
        label: '编辑排版',
        desc: '像杂志 / Notion 文章',
        swatch: '#f4f1ea',
        css: `
          :root{--page:#fcfbf7;--text:#1f2937;--muted:#6b7280;--link:#0f766e;--line:#e7e0d8;--accent:#b45309}
          html{background:var(--page)} body{margin:0 auto;max-width:780px;padding:72px 28px 90px;background:var(--page);color:var(--text);font:17px/1.9 Georgia,'Times New Roman',serif}
          h1,h2,h3,h4,h5,h6{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.15;letter-spacing:-.02em;color:#111827;margin:1.8em 0 .55em}
          h1{font-size:clamp(2.1rem,5vw,3.4rem);padding-bottom:.35em;border-bottom:2px solid var(--line)}

          p,li,blockquote,table{max-width:72ch}
          p{margin:.9em 0}
          a{color:var(--link);text-decoration-thickness:1px;text-underline-offset:3px}
          code{background:#f3eee6;padding:.15em .42em;border-radius:6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em;color:#7c2d12}

          pre code{background:none;padding:0;color:#111827}
          blockquote{border-left:4px solid #d6c2a8;background:#faf6ef;border-radius:0 16px 16px 0;padding:14px 18px;color:#4b5563}
          table{border-collapse:separate;border-spacing:0;width:100%;margin:1.2em 0;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 24px rgba(17,24,39,.05)}
          th,td{padding:12px 14px;border-bottom:1px solid var(--line)} th{background:#f5efe6;text-align:left;font-family:Inter,sans-serif} tr:last-child td{border-bottom:0}
          img{max-width:100%;height:auto;border-radius:18px;box-shadow:0 20px 50px rgba(17,24,39,.08)}
          hr{border:0;border-top:1px solid var(--line);margin:2.2em 0}

          p{color:#334155;margin:.85em 0}
          a{color:var(--accent);text-decoration:none}
          a:hover{text-decoration:underline}
          img,pre,blockquote,table,ul,ol,section,article,aside,figure{border-radius:18px}
          pre,blockquote,table,figure,section,article,aside,div,details{background:var(--panel);border:1px solid var(--line);box-shadow:0 10px 30px rgba(15,23,42,.06)}
          pre{padding:18px 20px;overflow:auto}
          code{background:#eaf2ff;color:#0f172a;padding:.15em .4em;border-radius:8px;font-size:.92em}

      },
      glass: {

        css: `

          h1{font-size:clamp(2.2rem,5vw,3.5rem)} h2{font-size:clamp(1.45rem,4vw,2rem)}
          p{color:#e2e8f0}
          a{color:#7dd3fc;text-decoration:none;border-bottom:1px solid rgba(125,211,252,.35)}
          a:hover{border-bottom-color:#7dd3fc}
          pre,blockquote,table,figure,section,article,aside,details{
            background:linear-gradient(180deg, rgba(15,23,42,.58), rgba(15,23,42,.36));
            border:1px solid var(--line); box-shadow:0 20px 60px rgba(0,0,0,.18); border-radius:22px;
          }
          pre{padding:18px 20px;overflow:auto}
          code{background:rgba(125,211,252,.13);color:#e0f2fe;padding:.15em .42em;border-radius:8px}

          th,td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08)} th{background:rgba(148,163,184,.1);text-align:left}
          tr:last-child td{border-bottom:0}
          img{max-width:100%;height:auto;display:block;border-radius:18px}
          button,input,textarea,select{font:inherit}
        `
      },
      brutalist: {
        label: '粗野主义',
        desc: '黑白强对比 / 厚边框',
        swatch: '#fde047',
        css: `
          :root{--bg:#fffdf7;--panel:#ffffff;--text:#111111;--muted:#444;--line:#111;--accent:#ffb000}

          h1{font-size:2rem;border-bottom:1px solid var(--line);padding-bottom:6px}

      },
      magazine: {
        label: '杂志风',
        desc: '大标题 / 细线 / 优雅留白',

      },
      minimal: {
        label: '极简阅读',
        desc: '干净 / 安静 / 专注内容',
        swatch: '#ffffff',
        css: `
          :root{--bg:#ffffff;--panel:#fff;--text:#101828;--muted:#667085;--line:#eaecf0;--accent:#475467}
          html{background:var(--bg)} body{margin:0 auto;max-width:720px;padding:64px 24px 96px;background:var(--bg);color:var(--text);font:16px/1.85 ui-serif,Georgia,'Times New Roman',serif}
          h1,h2,h3,h4,h5,h6{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;letter-spacing:-.03em;line-height:1.18;color:#111827}
          h1{font-size:clamp(2.1rem,5vw,3.2rem);margin:0 0 .4em}
          h2{font-size:clamp(1.4rem,4vw,1.9rem)}
          p{margin:.85em 0}
          a{color:#0f766e;text-decoration:none;border-bottom:1px solid rgba(15,118,110,.25)}
          a:hover{border-bottom-color:#0f766e}
          code{background:#f2f4f7;padding:.15em .42em;border-radius:6px;font-family:ui-monospace,monospace}
          pre{background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:18px 20px;overflow:auto}
          pre code{background:none;padding:0}
          blockquote{margin:1em 0;padding:12px 18px;border-left:3px solid #d0d5dd;color:#475467;background:#fafafa}
          table{border-collapse:separate;border-spacing:0;width:100%;margin:1.2em 0;border:1px solid var(--line);border-radius:18px;overflow:hidden}
          th,td{padding:12px 14px;border-bottom:1px solid var(--line)} th{background:#fafafa;text-align:left}
          tr:last-child td{border-bottom:0}
          img{max-width:100%;height:auto;display:block;border-radius:14px}
          hr{border:0;border-top:1px solid var(--line);margin:2.2em 0}
        `
      }
    };

    const THEME_ORDER = ['editorial','dashboard','glass','brutalist','terminal','magazine','minimal'];
    const SWATCHES = {
      editorial:'#f4f1ea', dashboard:'#93c5fd', glass:'#67e8f9', brutalist:'#fde047', terminal:'#22c55e', magazine:'#fda4af', minimal:'#ffffff'
    };

    const el = id => document.getElementById(id);
    const fileInput = el('fileInput');
    const uploadZone = el('uploadZone');
    const dropOverlay = el('dropOverlay');
    const emptyState = el('emptyState');
    const preview = el('preview');
    const themeStrip = el('themeStrip');
    const downloadBtn = el('downloadBtn');
    const fileName = el('fileName');
    const statusText = el('statusText');
    const toast = el('toast');
    const mainArea = el('mainArea');

    let originalHTML = '';
    let currentTheme = null;
    let currentThemeHTML = '';
    let toastTimer = null;

    function toastMsg(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function ensureHead(html) {
      if (/<head[^>]*>/i.test(html)) return html;
      return '<!doctype html><html><head></head><body>' + html + '</body></html>';
    }

    function injectTheme(html, css) {
      const safe = ensureHead(html);
      const headMatch = safe.match(/<head[^>]*>/i);
      const styleTag = '<style id="__theme__">\n' + css + '\n</style>';
      return headMatch
        ? safe.slice(0, headMatch.index + headMatch[0].length) + '\n' + styleTag + safe.slice(headMatch.index + headMatch[0].length)
        : '<head>' + styleTag + '</head>' + safe;
    }

    function render(html) {
      preview.srcdoc = html;
      preview.onload = () => preview.classList.add('show');
      preview.classList.remove('show');
    }

    function setActive(themeName) {
      currentTheme = themeName;
      document.querySelectorAll('.theme-card').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === themeName);
      });
      if (!originalHTML) {
        toastMsg('先上传 HTML 文件');
        return;
      }
      const css = THEMES[themeName].css;
      currentThemeHTML = injectTheme(originalHTML, css);
      render(currentThemeHTML);
      downloadBtn.disabled = false;
      statusText.textContent = `当前风格：${THEMES[themeName].label} · 点击下载可导出该版本 HTML`;
      toastMsg(`已切换到「${THEMES[themeName].label}」`);
    }

    function buildThemeCards() {
      themeStrip.innerHTML = '';
      THEME_ORDER.forEach(name => {
        const t = THEMES[name];
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'theme-card' + (name === 'editorial' ? ' active' : '');
        btn.dataset.theme = name;
        btn.innerHTML = `<span class="swatch" style="background:${SWATCHES[name]}"></span><span>${t.label}</span>`;
        btn.title = t.desc;
        btn.addEventListener('click', () => setActive(name));
        themeStrip.appendChild(btn);
      });
    }

    function handleFile(file) {
      if (!file) return;
      fileName.textContent = file.name;
      statusText.textContent = '读取中…';
      const reader = new FileReader();
      reader.onload = e => {
        originalHTML = String(e.target.result || '');
        uploadZone.classList.add('hidden');
        emptyState.style.display = 'none';
        currentThemeHTML = '';
        downloadBtn.disabled = true;
        // default preview immediately so it doesn't stay black/empty
        setActive('editorial');
        statusText.textContent = '已上传，点击上面的风格卡切换 UI';
        toastMsg('HTML 已载入');
      };
      reader.onerror = () => {
        statusText.textContent = '读取失败';
        toastMsg('读取文件失败');
      };
      reader.readAsText(file);
    }

    function downloadCurrent() {
      if (!currentThemeHTML) return;
      const base = (fileName.textContent || 'page').replace(/\.html?$/i, '');
      const blob = new Blob([currentThemeHTML], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${base}_${currentTheme}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toastMsg('已下载');
    }

    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    downloadBtn.addEventListener('click', downloadCurrent);

    mainArea.addEventListener('dragover', e => {
      e.preventDefault();
      dropOverlay.classList.add('visible');
    });
    mainArea.addEventListener('dragleave', e => {
      if (!mainArea.contains(e.relatedTarget)) dropOverlay.classList.remove('visible');
    });
    mainArea.addEventListener('drop', e => {
      e.preventDefault();
      dropOverlay.classList.remove('visible');
      handleFile(e.dataTransfer.files?.[0]);
    });

    buildThemeCards();
    render('<!doctype html><html><head><meta charset="utf-8"></head><body></body></html>');
  </script>
</body>
</html>
