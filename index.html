<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Theme Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117; color: #e6e6e6;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 16px; padding: 12px 20px;
    background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  #file-info { margin-left: auto; font-size: 13px; color: #8b949e; }

  /* ── Controls ── */
  #controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-group label { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }

  /* Buttons */
  button, label.file-btn {
    padding: 6px 14px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #e6e6e6; font-size: 13px; cursor: pointer;
    transition: background .15s, border-color .15s; white-space: nowrap;
  }
  button:hover, label.file-btn:hover { background: #30363d; border-color: #484f58; }
  button.active { border-color: #58a6ff; background: #1f3a5f; color: #79c0ff; }
  .download-btn { background: #238636; border-color: #2ea043; color: #fff; }
  .download-btn:hover { background: #2ea043; }

  /* Select */
  select {
    padding: 6px 10px; background: #21262d; border: 1px solid #30363d;
    border-radius: 6px; color: #e6e6e6; font-size: 13px; cursor: pointer; outline: none;
  }

  /* ── Iframe ── */
  #preview-wrapper {
    flex: 1; position: relative; overflow: hidden; background: #fff;
  }
  #preview {
    width: 100%; height: 100%; border: none;
    background: #fff;
  }

  /* ── Empty state ── */
  #empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: #161b22; color: #8b949e; cursor: pointer;
  }
  #empty.hidden { display: none; }
  #empty .icon { font-size: 48px; }
  #empty p { font-size: 15px; }

  /* ── Drop overlay ── */
  #drop-overlay {
    position: absolute; inset: 0; background: rgba(88,166,255,.08);
    border: 2px dashed #58a6ff; display: none;
    align-items: center; justify-content: center; font-size: 18px;
    color: #58a6ff; pointer-events: none; z-index: 10;
  }
  #drop-overlay.visible { display: flex; }
</style>
</head>
<body>

<header>
  <h1>🌐 HTML Theme Preview</h1>
  <span id="file-info">尚未上传文件</span>
</header>

<div id="controls">
  <div class="ctrl-group">
    <label>文件</label>
    <label class="file-btn" for="file-input">📁 选择 HTML</label>
    <input type="file" id="file-input" accept=".html,.htm" hidden>
    <button id="reload-btn">🔄 重新上传</button>
  </div>

  <span style="color:#30363d">|</span>

  <div class="ctrl-group">
    <label>主题</label>
    <select id="theme-select" disabled>
      <option value="none">— 选择主题 —</option>
      <option value="original">原始样式</option>
      <option value="minimal">✨ 极简 White</option>
      <option value="dark">🌙 深色 Dark</option>
      <option value="warm">🔥 暖色 Warm</option>
      <option value="ocean">🌊 海洋 Ocean</option>
      <option value="retro">📟 复古终端 Retro</option>
      <option value="neon">💜 霓虹 Neon</option>
      <option value="sage">🌿 鼠尾草 Sage</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>操作</label>
    <button id="apply-btn" disabled>🎨 应用主题</button>
    <button id="download-btn" class="download-btn" disabled>⬇ 下载结果</button>
  </div>
</div>

<div id="preview-wrapper">
  <div id="drop-overlay">松开鼠标以上传</div>
  <div id="empty">
    <div class="icon">📄</div>
    <p>点击「选择 HTML」或把文件拖到此处</p>
  </div>
  <iframe id="preview"></iframe>
</div>

<script>
const fileInput   = document.getElementById('file-input');
const reloadBtn   = document.getElementById('reload-btn');
const emptyState  = document.getElementById('empty');
const preview     = document.getElementById('preview');
const fileInfo    = document.getElementById('file-info');
const themeSelect = document.getElementById('theme-select');
const applyBtn    = document.getElementById('apply-btn');
const downloadBtn = document.getElementById('download-btn');
const dropOverlay = document.getElementById('drop-overlay');

let originalHTML = '';
let themedHTML   = '';

// ─── File handling ────────────────────────────────────
function loadFile(file) {
  if (!file) return;
  fileInfo.textContent = `${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  const reader = new FileReader();
  reader.onload = e => {
    originalHTML = e.target.result;
    // Reset
    themeSelect.value = 'none';
    applyBtn.disabled = downloadBtn.disabled = true;
    showPreview(originalHTML);
  };
  reader.readAsText(file);
}

function showPreview(html) {
  if (!html.trim()) return;
  emptyState.classList.add('hidden');
  preview.srcdoc = html;
}

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
reloadBtn.addEventListener('click', () => fileInput.click());

// ─── Drag & drop ──────────────────────────────────────
const wrapper = document.getElementById('preview-wrapper');
wrapper.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.classList.add('visible'); });
wrapper.addEventListener('dragleave', e => { if (!wrapper.contains(e.relatedTarget)) dropOverlay.classList.remove('visible'); });
wrapper.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.classList.remove('visible');
  loadFile(e.dataTransfer.files[0]);
});

// ─── Themes ───────────────────────────────────────────

};

// ─── Apply / download ─────────────────────────────────
function injectTheme(html, themeCSS) {
  if (!themeCSS) return html;

  // Insert <style> right after <head> or prepend if no head
  const headMatch = html.match(/<head[^>]*>/i);
  if (headMatch) {
    const idx = headMatch.index + headMatch[0].length;
    return html.slice(0, idx) + '\n<style id="app-theme">\n' + themeCSS + '\n</style>' + html.slice(idx);
  } else {
    return '<head><meta charset="UTF-8"><style id="app-theme">\n' + themeCSS + '\n</style></head>' + html;
  }
}

applyBtn.addEventListener('click', () => {
  const theme = themeSelect.value;
  if (theme === 'none' || !originalHTML) return;

  themedHTML = injectTheme(originalHTML, THEMES[theme]);

  // Update iframe
  emptyState.classList.add('hidden');
  preview.srcdoc = themedHTML;

  downloadBtn.disabled = false;

  // Visual feedback
  applyBtn.textContent = '✅ 已应用';
  setTimeout(() => { applyBtn.textContent = '🎨 应用主题'; }, 1500);
});

themeSelect.addEventListener('change', () => {
  applyBtn.disabled = !originalHTML || themeSelect.value === 'none';
});

downloadBtn.addEventListener('click', () => {
  if (!themedHTML) return;
  const blob = new Blob([themedHTML], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // Suggest filename
  const origName = fileInfo.textContent.split(' ')[0] || 'page';
  a.download = origName.replace(/\.html?$/i, '') + '_themed.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ─── Re-enable buttons when new file loaded ───────────
fileInput.addEventListener('change', () => {
  applyBtn.disabled = themeSelect.value === 'none';
});
reloadBtn.addEventListener('click', () => {
  fileInput.click();
});
</script>
